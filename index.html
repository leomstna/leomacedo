<!DOCTYPE html>

  <style>
    /* ============================================
       RESET & BASE
    ============================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #111111; --bg-alt: #1a1a1a; --red: #c026d3; --red-dark: #a21caf;
      --white: #ffffff; --grey: #888888; --grey-light: #bbbbbb; --border: #2a2a2a;
    }
    html { scroll-behavior: smooth; font-size: 16px; background: var(--bg) !important; }
    body { background: var(--bg) !important; color: var(--white) !important; font-family: 'Inter', system-ui, sans-serif; }
    a { color: inherit; text-decoration: none; }
    
    .logo-wordmark { display: inline-flex; align-items: baseline; gap: 0.18em; font-family: 'Inter', sans-serif; font-weight: 900; font-size: 1.5rem; }
    .logo-c { color: var(--red); }
    
    nav { position: fixed; top: 0; left: 0; width: 100vw; z-index: 1000; background: rgba(17,17,17,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .nav-inner { max-width: 1400px; margin: 0 auto; padding: 1.2rem 2rem; display: flex; align-items: center; justify-content: space-between; }
    .nav-links { display: flex; gap: 40px; list-style: none; }
    .nav-links a { color: #fff; font-weight: 600; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 2px; }

    .hero { padding: 10rem 2rem 5rem; text-align: center; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
    .hero-headline { font-family: 'Inter Tight'; font-size: clamp(3rem, 7vw, 5.5rem); font-weight: 900; text-transform: uppercase; margin-bottom: 1.4rem; }
    .highlight { color: var(--red); }

    .section { padding: 6rem 2rem; }
    .section-alt { background: var(--bg-alt); }
    .section-header { text-align: center; margin-bottom: 4rem; }
    
    .gallery-wrapper { width: 100vw; height: 80vh; min-height: 600px; overflow: hidden; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .circular-gallery { width: 100%; height: 100%; cursor: grab; }

    #pitch-video { background: #050505; border-top: 1px solid var(--border); text-align: center; padding: 6rem 2rem; }
    .pitch-eyebrow { color: var(--grey-light); font-size: 1rem; margin-bottom: 0.8rem; display: block; }
    .pitch-title { font-family: 'Inter Tight'; font-size: 1.3rem; font-weight: 900; color: var(--red); text-transform: uppercase; margin-bottom: 2rem; }
    .video-container { max-width: 850px; margin: 0 auto; border-radius: 12px; overflow: hidden; border: 1px solid rgba(192,38,211,0.3); background: #000; }
    .video-container video { width: 100%; height: auto; display: block; }

    .btn-red { background: var(--red); padding: 1rem 2.6rem; border-radius: 8px; font-weight: 700; text-transform: uppercase; }
  </style>
</head>
<body>

          e.preventDefault();
          const target = document.querySelector(this.getAttribute('href'));
          window.scrollTo({ top: target.offsetTop - 100, behavior: "smooth" });

    });
